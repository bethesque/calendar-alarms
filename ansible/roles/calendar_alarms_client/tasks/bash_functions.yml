- name: Set Audio client URL for bash functions
  ansible.builtin.copy:
    dest: /etc/profile.d/audio-client.sh
    mode: "0644"
    content: |
      export AUDIO_CLIENT_URL="http://localhost:{{ audio_client_http_port }}"
  become: true
  tags: bash_functions

- name: Copy bash function files
  ansible.builtin.copy:
    src: "bash_functions/"
    dest: "{{ bash_functions_dir }}/"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  tags: bash_functions
