- name: Check mpd group membership
  ansible.builtin.command: id -nG mpd
  register: mpd_groups
  changed_when: false

- name: Ensure mpd user is in audio group
  become: true
  ansible.builtin.user:
    name: mpd
    groups: audio
    append: true
  register: mpd_user_update

- name: Reset connection if group membership changed
  ansible.builtin.include_tasks: reset_connection.yaml
  when: mpd_user_update.changed | bool

- name: Ensure mpd runtime directory exists
  file:
    path: /run/mpd
    state: directory
    owner: "{{ mpd_user }}"
    group: audio
    mode: "0755"

- name: Ensure mpd data directory exists
  file:
    path: /var/lib/mpd/
    state: directory
    owner: "{{ mpd_user }}"
    group: audio
    mode: "0755"

- name: Configure MPD
  template:
    src: mpd.conf.j2
    dest: /etc/mpd.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart mpd

- name: Ensure MPD is enabled and running
  systemd:
    name: mpd
    enabled: yes
    state: started
