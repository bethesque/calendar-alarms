- name: Install project code
  ansible.builtin.import_tasks: codebase.yml
  tags:
    - http
    - codebase

# - name: End play
#   ansible.builtin.meta: end_play

- name: Install packages
  apt:
    name:
      - mpd
      - ffmpeg
      - alsa-utils
      - git
      - python3-pip
    state: present
    update_cache: yes
  become: yes

- name: Install Snapserver
  ansible.builtin.import_tasks: snapserver_install.yml

- name: Configure Snapserver
  ansible.builtin.import_tasks: snapserver_configure.yml

- name: Configure Snapserver service
  ansible.builtin.import_tasks: snapserver_service.yml

- name: Configure mpd
  ansible.builtin.import_tasks: mpd_configure.yml

- name: Install http service
  ansible.builtin.import_tasks: http.yml
  tags: http

- name: Install bash functions
  ansible.builtin.import_tasks: bash_functions.yml
  tags:
    - bash_functions

- name: Test snapcast
  ansible.builtin.shell: |
    mpc clear
    mpc add /usr/share/sounds/alsa/Front_Center.wav
    mpc volume 50
    mpc play
    sleep 5
    mpc clear
  environment:
    MPD_HOST: "{{ mpd_bind_address }}"
  tags:
    - audio
    - pvt
