# If the nas gets rebooted, the /run/snapserver directory gets recreated by the starting of the snapserver
# service (RuntimeDirectory=snapserver). The fifo then gets created by _snapserver.
# ls -la /run/snapserver
# total 0
# drwxr-xr-x  2 _snapserver audio   60 Jun 14 09:56 .
# drwxr-xr-x 37 root        root  1100 Jun 14 09:56 ..
# prw-rw-rw-  1 _snapserver audio    0 Jun 14 09:57 snapfifo
# This means that root doesn't own the snapfifo any more (it's owned by _snapserver/audio). However - it all still seems to work, shrug.

- name: Ensure snapserver runtime directory exists
  file:
    path: /run/snapserver
    state: directory
    owner: _snapserver
    group: audio
    mode: "0755"
  become: true

# MPD FIFO
- name: Ensure FIFO exists
  command: mkfifo {{ mpd_fifo_path }}
  args:
    creates: "{{ mpd_fifo_path }}"
  become: true

- name: Set FIFO permissions
  file:
    path: "{{ mpd_fifo_path }}"
    owner: root
    group: audio
    mode: "0660"
  become: true

- name: Ensure snapserver user is in audio group
  ansible.builtin.user:
    name: _snapserver
    groups: audio
    append: yes

- name: Configure Snapserver
  template:
    src: snapserver.conf.j2
    dest: /etc/snapserver.conf
    owner: root
    group: root
    mode: "0644"
  tags:
    - sample_rate

- name: Install Snapweb (use the custom build from https://github.com/bethesque/snapweb)
  copy:
    src: "{{ playbook_dir }}/../snapweb/"
    dest: "{{ snapweb_doc_root }}"
