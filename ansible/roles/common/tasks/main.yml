- name: Ensure bash functions directory exists
  ansible.builtin.file:
    path: "{{ bash_functions_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  tags:
    - bash_functions

- name: Ensure bash function loader exists in .bashrc
  ansible.builtin.blockinfile:
    path: "/home/{{ ansible_user }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BASH FUNCTIONS"
    block: |
      # Load custom bash functions
      if [ -d "$HOME/.bash_functions" ]; then
        for f in "$HOME/.bash_functions"/*.sh; do
          [ -r "$f" ] && source "$f"
        done
      fi
  tags:
    - bash_functions

- name: Ensure bash aliases file exists
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.bash_aliases"
    state: touch
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  tags:
    - bash_functions

- name: Bash aliases
  ansible.builtin.blockinfile:
    path: "/home/{{ ansible_user }}/.bash_aliases"
    marker: "# {mark} ANSIBLE MANAGED BASH ALIASES"
    block: |
      alias g='git status'
  tags:
    - bash_functions

- name: Ensure user systemd directory exists
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config/systemd/user"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Configure sound
  ansible.builtin.import_tasks: sound.yml
  when: is_pi
  tags:
    - audio
    - sendspin

# ssh keys to allow Home Assistant to get the sevice status
- name: Add local public SSH key to remote authorized_keys
  ansible.posix.authorized_key:
    user: "{{ ansible_user }}"
    state: present
    key: "{{ travnas_ssh_public_key }}" # from secrets.yaml
  become: yes
  tags:
    - authorized_keys

- name: Install rmate
  ansible.builtin.copy:
    src: "rmate"
    dest: "/usr/local/bin/rmate"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  become: true
  tags:
    - rmate
